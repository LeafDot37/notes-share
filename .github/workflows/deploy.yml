name: Deploy Quartz to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Clone Quartz v4 (stable) and setup content
        run: |
          git clone --depth 1 --branch v4 https://github.com/jackyzha0/quartz.git /tmp/quartz
          # Copy all notes into content/ (exclude config, git files)
          mkdir -p /tmp/quartz/content
          for item in "${{ github.workspace }}"/*; do
            f=$(basename "$item")
            case "$f" in .github|quartz.config.ts|quartz.layout.ts) continue ;; esac
            cp -r "$item" /tmp/quartz/content/
          done
          # Remove Hub files: keep only index.md and numbered notes (X.Y) from subject/chapter dirs
          find /tmp/quartz/content -maxdepth 3 -name "*.md" ! -name "index.md" ! -name "README.md" ! -name "知识图谱构建方法论.md" | while read f; do
            basename=$(basename "$f" .md)
            # Keep numbered notes like "1.1 复杂度分析.md"
            if echo "$basename" | grep -qE '^[0-9]+\.[0-9]+ '; then
              continue
            fi
            # Also keep .claude/ files
            case "$f" in */.claude/*) continue ;; esac
            echo "Removing Hub duplicate: $f"
            rm "$f"
          done
          # Override default config with ours
          cp "${{ github.workspace }}/quartz.config.ts" /tmp/quartz/
          cp "${{ github.workspace }}/quartz.layout.ts" /tmp/quartz/

      - name: Install Dependencies
        working-directory: /tmp/quartz
        run: npm ci

      - name: Build Quartz
        working-directory: /tmp/quartz
        run: npx quartz build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: /tmp/quartz/public

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
