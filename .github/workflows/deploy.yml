name: Deploy Quartz to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Clone Quartz v4 (stable) and setup content
        run: |
          git clone --depth 1 --branch v4 https://github.com/jackyzha0/quartz.git /tmp/quartz
          # Copy all notes into content/ (handle spaces in filenames)
          mkdir -p /tmp/quartz/content
          find "${{ github.workspace }}" -maxdepth 1 \
            -not -name "." \
            -not -name ".*" \
            -not -name ".github" \
            -not -name "quartz.config.ts" \
            -not -name "quartz.layout.ts" \
            -exec cp -r {} /tmp/quartz/content/ \;
          # Remove index.md files from subject/chapter dirs (keep only Hub and numbered notes)
          find /tmp/quartz/content -mindepth 2 -name "index.md" -print0 | while IFS= read -r -d '' f; do
            echo "Removing index: $f"
            rm "$f"
          done
          # Override default config with ours
          cp "${{ github.workspace }}/quartz.config.ts" /tmp/quartz/
          cp "${{ github.workspace }}/quartz.layout.ts" /tmp/quartz/

      - name: Install Dependencies
        working-directory: /tmp/quartz
        run: npm ci

      - name: Build Quartz
        working-directory: /tmp/quartz
        run: npx quartz build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: /tmp/quartz/public

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
