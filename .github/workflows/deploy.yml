name: Deploy Quartz to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Clone and Setup Quartz
        run: |
          git clone --depth 1 https://github.com/jackyzha0/quartz.git /tmp/quartz
          # Copy all notes into content/ (exclude config and git files)
          mkdir -p /tmp/quartz/content
          for item in "${{ github.workspace }}"/*; do
            f=$(basename "$item")
            case "$f" in .github|quartz.config.yaml) continue ;; esac
            cp -r "$item" /tmp/quartz/content/
          done
          # Install our config + remove default configs that conflict
          cp "${{ github.workspace }}/quartz.config.yaml" /tmp/quartz/
          rm -f /tmp/quartz/quartz.config.ts /tmp/quartz/quartz.ts 2>/dev/null; true

      - name: Install Dependencies
        working-directory: /tmp/quartz
        run: npm ci

      - name: Install Quartz Plugins
        working-directory: /tmp/quartz
        run: npx quartz plugin install

      - name: Build Quartz
        working-directory: /tmp/quartz
        run: npx quartz build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: /tmp/quartz/public

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
