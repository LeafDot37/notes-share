name: Deploy Quartz to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clone Quartz
        run: |
          git clone https://github.com/jackyzha0/quartz.git /tmp/quartz
          cp -r ${{ github.workspace }}/* /tmp/quartz/content/
          cp ${{ github.workspace }}/quartz.config.ts /tmp/quartz/
          cp ${{ github.workspace }}/quartz.layout.ts /tmp/quartz/

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: |
          cd /tmp/quartz
          npm ci

      - name: Build Quartz
        run: |
          cd /tmp/quartz
          npx quartz build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: /tmp/quartz/public

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
